<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />

  <!-- Icon and favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <!-- Viewport and display -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1f1f23" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1f1f23" />

  <!-- SEO and App Info -->
  <meta name="description" content="Progressive Web App for RSS feed reading with offline support" />
  <meta name="keywords" content="RSS, feed reader, offline reading, PWA, news aggregator" />
  <meta name="author" content="RSS Reader Team" />
  <meta name="application-name" content="RSS Reader" />

  <!-- Mobile Web App -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-title" content="RSS Reader">

  <!-- Apple iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RSS Reader" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="57x57" href="/assets/apple-touch-icon-57x57.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="/assets/apple-touch-icon-72x72.png" />
  <link rel="apple-touch-icon" sizes="76x76" href="/assets/apple-touch-icon-76x76.png" />
  <link rel="apple-touch-icon" sizes="114x114" href="/assets/apple-touch-icon-114x114.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/assets/apple-touch-icon-120x120.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/assets/apple-touch-icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/assets/apple-touch-icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-180x180.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <title>RSS Reader - Feed Your Knowledge</title>

  <!-- Theme initialization script - prevents FOUC (Flash of Unstyled Content) -->
  <script>
    (function () {
      try {
        const storedTheme = localStorage.getItem('theme');
        let theme = 'light';

        if (storedTheme === 'light' || storedTheme === 'dark') {
          theme = storedTheme;
        } else {
          // Use system preference for 'system' mode or if no stored value
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        // Apply theme class immediately
        document.documentElement.classList.add(theme);

        // Update meta theme-color
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) {
          metaThemeColor.setAttribute('content', theme === 'dark' ? '#000000' : '#ffffff');
        }

        // Update loading screen
        const loadingElement = document.getElementById('app-loading');
        if (loadingElement && theme === 'light') {
          loadingElement.classList.add('light');
        }
      } catch (e) {
        // Silently fail in case of error
      }
    })();
  </script>

  <!-- Critical CSS for loading screen - prevents transparent/white flash on PWA launch -->
  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #1f1f23;
      color: #e5e5e5;
      transition: opacity 0.3s ease;
    }
    html.light #app-loading {
      background-color: #ffffff;
      color: #1a1a1a;
    }
    #app-loading.hide {
      opacity: 0;
      pointer-events: none;
    }
    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #e5e5e5;
      border-radius: 50%;
      animation: app-spin 0.75s linear infinite;
    }
    html.light .loading-spinner {
      border-color: rgba(0, 0, 0, 0.1);
      border-top-color: #1a1a1a;
    }
    .loading-text {
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      opacity: 0.6;
    }
    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <!-- Loading screen to prevent white screen -->
  <div id="app-loading">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
